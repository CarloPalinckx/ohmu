name: Vuln Fix
description: Locate and patch a security vulnerability identified by CVE or CWE.
title: "[vuln-fix] "
labels: []
body:
  - type: textarea
    id: mission
    attributes:
      label: mission
      description: "Identifies the mission type for the coding agent. Do not modify."
      value: vuln-fix
    validations:
      required: true
  - type: input
    id: repo
    attributes:
      label: repo
      description: "GitHub repository to work in (owner/name, e.g. acme/my-app)"
    validations:
      required: true
  - type: input
    id: identifier
    attributes:
      label: identifier
      description: CVE or CWE identifier (e.g. CVE-2021-44228 or CWE-79)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: description
      description: Plain-text summary of the vulnerability and affected area
    validations:
      required: false
